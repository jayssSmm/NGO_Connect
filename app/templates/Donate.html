<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate to NGOs</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="../static/utility.css">
</head>
<div id="auth-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:999; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:12px; padding:2rem 2.5rem; max-width:360px; width:90%; text-align:center; box-shadow: 0 8px 32px rgba(0,0,0,0.18);">
        <div style="font-size:2rem; margin-bottom:0.75rem;">🔒</div>
        <h3 style="margin:0 0 0.5rem; font-size:1.1rem; font-weight:600;">Login Required</h3>
        <p style="margin:0 0 1.5rem; font-size:0.9rem; color:#666;">You need to be logged in to access this feature.</p>
        <div style="display:flex; gap:0.75rem; justify-content:center;">
            <a href="/login" style="padding:0.55rem 1.4rem; background:#2563eb; color:#fff; border-radius:7px; text-decoration:none; font-size:0.9rem; font-weight:500;">Login</a>
            <a href="/register" style="padding:0.55rem 1.4rem; background:#f3f4f6; color:#374151; border-radius:7px; text-decoration:none; font-size:0.9rem; font-weight:500;">Sign Up</a>
            <button onclick="closeModal()" style="padding:0.55rem 1.1rem; border:1px solid #e5e7eb; border-radius:7px; background:none; cursor:pointer; font-size:0.9rem; color:#6b7280;">Cancel</button>
        </div>
    </div>
</div>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <div class="logo">
                    <a href="/">
                        <img src="../static/images/NGO_Connect.png" alt="NGO Connect Logo">
                    </a>
                </div>
                <ul class="nav-links">
                    <li><a href="/about">About</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </div>
            <div class="nav-center">
                <div class="options">
                    <a type="explore" class="option" href="/explore">Explore NGOs</a>
                    <a type="donate" class="option" href="/donate">Donate</a>
                    <a type="volunteer" class="option" href="/volunteer">Volunteer</a>
                </div>
            </div>
            <div class="auth-buttons">
                {% if is_authenticated %}
                    <a class="btn" href="/dashboard">Dashboard</a>
                    <a class="btn" href="/logout">Logout</a>
                {% else %}
                    <a class="btn login" href="/login">Login</a>
                    <a class="btn signup" href="/register">Sign Up</a>
                {% endif %}
            </div>
        </nav>
    </header>
    <main>
        <div class="bg">
            <div class="search">
                <input type="text" id="searchInput" placeholder="Search NGO">
                <button onclick="searchNGOs()">Search</button>
            </div>
            <div class="ngo-list" id="ngoList"></div>
            <div class="donation-section" id="donationSection">
                <h3>Donate to <span id="ngoName"></span></h3>
                <div>
                    <h4>Donate Money</h4>
                    <input type="number" id="amount" placeholder="Amount (min 1 INR)" min="1">
                    <button onclick="donateMoney()">Donate Money</button>
                </div>
                <div>
                    <h4>Donate Items</h4>
                    <textarea id="items" onclick="donateItemsBox()" placeholder="List items you want to donate"></textarea>
                    <button onclick="donateItems()">Donate Items</button>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 NGO Connect. All rights reserved.</p>
    </footer>
    <script src="../static/Donate.js"></script>
</body>
</html>
