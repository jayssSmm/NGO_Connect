<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate to NGOs</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="../static/utility.css">
</head>
<body>
    <div id="auth-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:999; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:12px; padding:2rem 2.5rem; max-width:360px; width:90%; text-align:center; box-shadow: 0 8px 32px rgba(0,0,0,0.18);">
            <div style="font-size:2rem; margin-bottom:0.75rem;">🔒</div>
            <h3 style="margin:0 0 0.5rem; font-size:1.1rem; font-weight:600;">Login Required</h3>
            <p style="margin:0 0 1.5rem; font-size:0.9rem; color:#666;">You need to be logged in to access this feature.</p>
            <div style="display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
                <a href="/login" style="padding:0.55rem 1.4rem; background:#2563eb; color:#fff; border-radius:7px; text-decoration:none; font-size:0.9rem; font-weight:500;">Login</a>
                <a href="/register" style="padding:0.55rem 1.4rem; background:#f3f4f6; color:#374151; border-radius:7px; text-decoration:none; font-size:0.9rem; font-weight:500;">Sign Up</a>
                <button onclick="closeModal()" style="padding:0.55rem 1.1rem; border:1px solid #e5e7eb; border-radius:7px; background:none; cursor:pointer; font-size:0.9rem; color:#6b7280;">Cancel</button>
            </div>
        </div>
    </div>
    <header>
        <nav>
            <div class="nav-left">
                <div class="logo">
                    <a href="/">
                        <img src="../static/images/NGO_Connect.png" alt="NGO Connect Logo">
                    </a>
                </div>
                <ul class="nav-links">
                    <li><a href="/about">About</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </div>
            <div class="nav-center">
                <div class="options">
                    <a type="explore" class="option" href="/explore">Explore NGOs</a>
                    <a type="donate" class="option" href="/donate">Donate</a>
                    <a type="volunteer" class="option" href="/volunteer">Volunteer</a>
                </div>
            </div>
            <div class="auth-buttons">
                <a class="btn login" href="/login">Login</a>
                <a class="btn signup" href="/register">Sign Up</a>
            </div>
        </nav>
    </header>
    <main>
        <div class="bg donate-page">
            <div class="donate-search">
                <input type="text" id="searchInput" placeholder="Search NGO to donate to">
                <button type="button" onclick="searchNGOs()">Search</button>
            </div>
            <div class="donate-layout">
                <div class="ngo-list" id="ngoList"></div>
                <div class="donation-section" id="donationSection" style="display:none;">
                    <h3>Donate to <span id="ngoName">select an NGO</span></h3>
                    <div class="donation-block">
                        <h4>Donate Money</h4>
                        <input type="number" id="amount" min="1" placeholder="Amount (min 1 INR)">
                        <button type="button" onclick="donateMoney()">Donate Money</button>
                    </div>
                    <div class="donation-block">
                        <h4>Donate Items</h4>
                        <textarea id="items" placeholder="List items you want to donate" rows="5"></textarea>
                        <button type="button" onclick="donateItems()">Donate Items</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 NGO Connect. All rights reserved.</p>
    </footer>
    <style>
        .donate-page { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; min-height:calc(100vh - 160px); padding:40px 20px 32px; gap:24px; }
        .donate-search { display:flex; width:100%; max-width:780px; gap:10px; justify-content:center; align-items:center; }
        .donate-search input { flex:1; padding:14px 16px; border-radius:12px; border:1px solid #cbd5e1; font-size:1rem; }
        .donate-search button { min-width:140px; padding:14px 18px; border:none; border-radius:12px; background:#4f46e5; color:#fff; font-size:1rem; cursor:pointer; }
        .donate-layout { width:100%; max-width:1240px; display:grid; grid-template-columns:1fr 380px; gap:24px; }
        .ngo-list { display:grid; gap:16px; }
        .ngo-item { padding:18px 20px; border-radius:18px; border:1px solid #e2e8f0; background:#fff; cursor:pointer; transition:transform .15s ease, box-shadow .15s ease; }
        .ngo-item:hover { transform:translateY(-2px); box-shadow:0 14px 35px rgba(15,23,42,.08); }
        .ngo-item h4 { margin:0 0 8px; font-size:1rem; color:#1f2937; }
        .ngo-item p { margin:4px 0; color:#475569; font-size:0.95rem; }
        .donation-section { display:grid; gap:18px; background:#fff; border:1px solid #e2e8f0; border-radius:20px; padding:24px; min-height:280px; }
        .donation-section h3 { margin:0 0 8px; font-size:1.2rem; color:#111827; }
        .donation-block { display:flex; flex-direction:column; gap:10px; }
        .donation-block h4 { margin:0; font-size:1rem; color:#1f2937; }
        .donation-block input, .donation-block textarea { width:100%; border:1px solid #cbd5e1; border-radius:14px; padding:14px 16px; font-size:1rem; resize:vertical; }
        .donation-block button { width:100%; padding:14px 18px; border:none; border-radius:14px; background:#2563eb; color:#fff; font-size:1rem; cursor:pointer; }
        .donation-section.hide { display:none; }
        @media(max-width:980px){ .donate-layout { grid-template-columns:1fr; } }
        @media(max-width:720px){ .donate-search { flex-direction:column; } }
    </style>
    <script src="../static/Donate.js"></script>
</body>
</html>
