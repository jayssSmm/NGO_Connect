<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate to NGOs</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="../static/utility.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* --- KEEPING YOUR ORIGINAL PAGE CSS --- */
        .donate-page { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; min-height:calc(100vh - 160px); padding:40px 20px 32px; gap:24px; font-family: 'DM Sans', sans-serif; }
        .donate-search { display:flex; width:100%; max-width:780px; gap:10px; justify-content:center; align-items:center; }
        .donate-search input { flex:1; padding:14px 16px; border-radius:12px; border:1px solid #cbd5e1; font-size:1rem; }
        .donate-search button { min-width:140px; padding:14px 18px; border:none; border-radius:12px; background:#4f46e5; color:#fff; font-size:1rem; cursor:pointer; }
        .donate-layout { width:100%; max-width:1240px; display:grid; grid-template-columns:1fr 380px; gap:24px; }
        .ngo-list { display:grid; gap:16px; }
        .ngo-item { padding:18px 20px; border-radius:18px; border:1px solid #e2e8f0; background:#fff; cursor:pointer; transition:transform .15s ease, box-shadow .15s ease; }
        .ngo-item:hover { transform:translateY(-2px); box-shadow:0 14px 35px rgba(15,23,42,.08); }
        .ngo-item h4 { margin:0 0 8px; font-size:1rem; color:#1f2937; }
        .ngo-item p { margin:4px 0; color:#475569; font-size:0.95rem; }
        .donation-section { display:grid; gap:18px; background:#fff; border:1px solid #e2e8f0; border-radius:20px; padding:24px; min-height:280px; align-self: start; }
        .donation-section h3 { margin:0 0 8px; font-size:1.2rem; color:#111827; }
        .donation-block { display:flex; flex-direction:column; gap:10px; }
        .donation-block h4 { margin:0; font-size:1rem; color:#1f2937; }
        .donation-block textarea { width:100%; border:1px solid #cbd5e1; border-radius:14px; padding:14px 16px; font-size:1rem; resize:vertical; }
        .donation-block button { width:100%; padding:14px 18px; border:none; border-radius:14px; background:#2563eb; color:#fff; font-size:1rem; cursor:pointer; font-weight: 600; }
        
        /* --- MODAL CSS (The New Pop-up Styles) --- */
        .overlay { display:none; position:fixed; inset:0; background:rgba(15,23,42,.65); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(6px); }
        .overlay.active { display:flex; }
        .modal { background:#fff; border-radius:22px; width:100%; max-width:440px; overflow:hidden; position:relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .modal-header { background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%); padding:22px 24px 20px; color:#fff; position:relative; }
        .close-btn { position:absolute; top:14px; right:14px; background:rgba(255,255,255,.2); border:none; color:#fff; width:30px; height:30px; border-radius:50%; cursor:pointer; }
        .modal-body { padding:22px; }
        .amount-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:10px; }
        .amt-btn { border:1.5px solid #e2e8f0; background:#f8fafc; border-radius:9px; padding:9px 6px; font-size:13px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .amt-btn.selected { border-color:#6366f1; background:#eef2ff; color:#6366f1; }
        .pay-btn { width:100%; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; margin-top:10px; }
        .hidden { display:none !important; }
        .receipt { background:#f8fafc; border:1.5px solid #e2e8f0; border-radius:14px; padding:16px; text-align:left; font-size: 12px; margin-top: 10px; }
        .rrow { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px dashed #e8ecf0; }
        .green { color:#16a34a; font-weight:800; }

        @media(max-width:980px){ .donate-layout { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <div class="logo"><a href="/"><img src="../static/images/NGO_Connect.png" alt="Logo"></a></div>
                <ul class="nav-links">
                    <li><a href="/about">About</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </div>
            <div class="nav-center">
                <div class="options">
                    <a class="option" href="/">Volunteer</a>
                    <a class="option" href="/features">All Feature Pages</a>
                </div>
            </div>
            <div class="auth-buttons">
                <a class="btn login" href="/login">Login</a>
                <a class="btn signup" href="/register">Sign Up</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="bg donate-page">
            <div class="donate-search">
                <input type="text" id="searchInput" placeholder="Search NGO to donate to">
                <button type="button" onclick="searchNGOs()">Search</button>
            </div>
            <div class="donate-layout">
                <div class="ngo-list" id="ngoList"></div>
                <div class="donation-section" id="donationSection" style="display:none;">
                    <h3>Donate to <span id="ngoName">select an NGO</span></h3>
                    <div class="donation-block">
                        <h4>Donate Money</h4>
                        <button type="button" onclick="openDonateModal()">Donate Money</button>
                    </div>
                    <div class="donation-block" style="margin-top: 15px;">
                        <h4>Donate Items</h4>
                        <textarea id="items" placeholder="List items you want to donate" rows="5"></textarea>
                        <button type="button" onclick="donateItems()">Donate Items</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

<div class="overlay" id="overlay">
    <div class="modal">
        <div class="modal-header">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <h2 id="mh-name">Donate</h2>
            <p id="mh-focus">Supporting a great cause</p>
        </div>
        <div class="modal-body">
            <div id="step1">
                <label style="font-size:12px; font-weight:600; margin-bottom:8px; display:block; color:#475569;">Select Amount (₹)</label>
                <div class="amount-grid">
                    <button class="amt-btn" onclick="pickAmt(this, 100)">₹100</button>
                    <button class="amt-btn" onclick="pickAmt(this, 500)">₹500</button>
                    <button class="amt-btn" onclick="pickAmt(this, 1000)">₹1000</button>
                </div>
                <input type="number" id="custom-amt" placeholder="Or type any amount" oninput="customInput(this)" style="width:100%; padding:12px; border:1.5px solid #e2e8f0; border-radius:10px; margin-bottom:15px; outline:none;">
                <button class="pay-btn" onclick="toStep2()">Continue to Payment →</button>
            </div>

            <div id="step2" class="hidden">
                <div style="margin-bottom:12px;">
                    <input type="text" id="f-name" placeholder="Full Name on Card" style="width:100%; padding:12px; border:1.5px solid #e2e8f0; border-radius:10px; outline:none;">
                </div>
                <div style="margin-bottom:12px;">
                    <input type="text" id="f-card" placeholder="Card Number (XXXX XXXX XXXX XXXX)" maxlength="19" oninput="fmtCard(this)" style="width:100%; padding:12px; border:1.5px solid #e2e8f0; border-radius:10px; outline:none;">
                </div>
                <button class="pay-btn" onclick="toProcessing()">🔒 Authorise ₹<span id="pay-lbl">0</span></button>
            </div>

            <div id="success" class="hidden" style="text-align:center;">
                <div style="font-size:48px; margin-bottom:10px;">🎉</div>
                <h3 style="color:#16a34a; margin-bottom:5px;">Donation Successful!</h3>
                <p style="font-size:13px; color:#64748b; margin-bottom:15px;">A receipt has been generated for your records.</p>
                <div class="receipt">
                    <div class="rrow"><span>Recipient NGO</span><span id="r-ngo" style="font-weight:600;"></span></div>
                    <div class="rrow"><span>Amount Paid</span><span id="r-amt" class="green"></span></div>
                    <div class="rrow"><span>Transaction ID</span><span id="r-txn" style="font-family:'DM Mono', monospace; color:#6366f1;"></span></div>
                    <div class="rrow"><span>Status</span><span style="color:#16a34a; font-weight:700;">VERIFIED</span></div>
                </div>
                <button class="pay-btn" style="background:#f1f5f9; color:#1e293b; margin-top:15px;" onclick="closeModal()">Close Window</button>
            </div>
        </div>
    </div>
</div>

    <script src="../static/Donate.js"></script>

</body>
</html>
