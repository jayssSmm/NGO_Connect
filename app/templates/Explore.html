<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore NGOs</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="../static/utility.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <div class="logo">
                    <a href="/">
                        <img src="../static/images/NGO_Connect.png" alt="NGO Connect Logo">
                    </a>
                </div>
                <ul class="nav-links">
                    <li><a href="/about">About</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </div>
            <div class="nav-center">
                <div class="options">
                    <a type="explore" class="option" href="/explore">Explore NGOs</a>
                    <a type="donate" class="option" href="/donate">Donate</a>
                    <a type="volunteer" class="option" href="/volunteer">Volunteer</a>
                </div>
            </div>
            <div class="auth-buttons">
                <a class="btn login" href="/login">Login</a>
                <a class="btn signup" href="/register">Sign Up</a>
            </div>
        </nav>
    </header>
    <main>
        <div class="bg">
            <div class="nav-center">
                <div class="search">
                    <input type="text" id="searchInput" placeholder="Search NGOs">
                    <button type="submit" onclick="searchNGOs()">Search</button>
                </div>
            </div>
            <div class="near-you">
                <h3>Want to know NGOs near you?</h3>
                <input type="text" id="coordsInput" placeholder="Paste your coordinates here (latitude, longitude)">
                <button onclick="getLocation()">Get My Location</button>
                <button onclick="findNearbyNGOs()">Find Nearby NGOs</button>
            </div>
            <div class="ngo-list" id="ngoList">
                <!-- NGO list will be populated here -->
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 NGO Connect. All rights reserved.</p>
    </footer>
    <script src="../static/Explore.js"></script>
</body>
</html>
