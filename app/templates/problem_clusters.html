<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem Clustering</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="../static/utility.css">
    <link rel="stylesheet" href="../static/ngo_features.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <div class="logo">
                    <a href="/">
                        <img src="../static/images/NGO_Connect.png" alt="NGO Connect Logo">
                    </a>
                </div>
                <ul class="nav-links">
                    <li><a href="/about">About</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </div>
            <div class="nav-center">
                <div class="options">
                    <a class="option" href="/donate">Donate</a>
                </div>
            </div>
            <div class="auth-buttons">
                <a class="btn login" href="/login">Login</a>
                <a class="btn signup" href="/register">Sign Up</a>
            </div>
        </nav>
    </header>
    {% include 'features_nav.html' %}
    <main class="page-content" data-page="clusters">
        <div class="page-header">
            <div>
                <h1 class="page-title">Problem Clustering</h1>
                <p class="page-subtitle">Explore how Kolkata NGOs group into key impact categories and visualize cluster density with an interactive bubble chart.</p>
            </div>
            <div class="field-group">
                <label for="clusterFilter">Highlight Cluster</label>
                <select id="clusterFilter">
                    <option>All</option>
                    <option>Elderly Care</option>
                    <option>Child Welfare</option>
                    <option>Animal Welfare</option>
                    <option>Healthcare + Education</option>
                </select>
            </div>
        </div>
        <div class="grid-two">
            <div class="card-panel" id="clusterCards"></div>
            <div class="card-panel chart-card">
                <h2>Cluster Bubble Chart</h2>
                <canvas id="clusterChart"></canvas>
            </div>
        </div>
    </main>
    <footer><p>&copy; 2024 NGO Connect. All rights reserved.</p></footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../static/ngo_features.js"></script>
</body>
</html>
