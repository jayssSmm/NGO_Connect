<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="../static/utility.css">
</head>
<body class="page-centered">
    <div class="login-form">
        <h2>Login</h2>
        <form id="loginForm" action="/login" method="post">
            <input type="email" id="email" name='email' placeholder="Email" required>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <div class="forgot-password">
                <a href="#" onclick="showForgotPassword()">Forgot Password?</a>
            </div>
            <button type="submit">Login</button>
        </form>
        <div class="or">-----------------OR--------------------------</div>
        <button class="google-btn" onclick="continueWithGoogle()">Continue with Google</button>
        <div class="signup-link">
            <p>Don't have an account? <a href="/register">Sign Up</a></p>
        </div>

        <div class="otp-section" id="otpSection">
            <h3>Forgot Password</h3>
            <input type="email" id="resetEmail" placeholder="Enter your email" required>
            <button onclick="sendOTP()">Get OTP</button>
            <input type="text" id="otp" placeholder="Enter OTP" style="display:none;">
            <button onclick="verifyOTP()" style="display:none;" id="verifyBtn">Verify OTP</button>
        </div>

        <div class="reset-section" id="resetSection">
            <h3>Reset Password</h3>
            <input type="password" id="newPassword" placeholder="New Password" required>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            <button onclick="resetPassword()">Confirm</button>
        </div>
    </div>
</body>
</html>
