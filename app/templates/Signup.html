<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="../static/utility.css">
    <style>
        .error-text { color: #e53e3e; margin: 0 0 16px; display: none; font-size: 0.95rem; }
        .info-text { color: #166534; margin: 0 0 16px; display: none; font-size: 0.95rem; }
    </style>
</head>
<body class="page-centered">
    <div class="signup-form">
        <h2>Sign Up</h2>
        <p id="signupError" class="error-text"></p>
        <form id="registerForm">
            <input type="hidden" id="nextUrl" name="next" value="{{ next_url }}">
            <input type="text" id="fullName" name="full_name" placeholder="Full Name" required>
            <input type="email" id="email" name="email" placeholder="Email" required>
            <input type="password" id="password" name="password" placeholder="Create Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <div class="login-link">
            <p>Already have an account? <a href="/login">Login</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const errorEl = document.getElementById('signupError');
            errorEl.style.display = 'none';

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const nextUrl = document.getElementById('nextUrl').value || '/';

            if (!fullName || !email || !password) {
                errorEl.textContent = 'Please fill in all fields.';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name: fullName, email, password, next: nextUrl })
                });
                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.error || 'Unable to sign up. Please try again.';
                    errorEl.style.display = 'block';
                } else {
                    window.location.href = data.redirect || '/';
                }
            } catch (err) {
                errorEl.textContent = 'Unable to sign up right now. Please try again later.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
