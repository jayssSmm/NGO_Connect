<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="../static/utility.css">
    <style>
        .spinner {
            display: inline-block;
            width: 13px;
            height: 13px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 4px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="page-centered">
    <div class="signup-form">
        <h2>Sign Up</h2>

        <form id="registerForm">
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Create Password" required>
            <p id="registerError" style="color:red; display:none;"></p>
            <button type="button" id="generateOTPBtn">Generate OTP</button>
        </form>

        <form id="otpForm" style="display:none;">
            <p style="font-size:0.9rem; color:#555; margin-bottom:0.75rem;">
                OTP sent to <strong id="sentToEmail"></strong>. Valid for 10 minutes.
            </p>
            <input type="text" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6" required>
            <p id="otpError" style="color:red; display:none;"></p>
            <button type="submit" id="verifySignupOtpBtn">Verify & Sign Up</button>
            <button type="button" id="resendOTPBtn" style="margin-top:0.5rem; background:none; border:none; color:#2563eb; cursor:pointer; font-size:0.9rem;">
                Resend OTP
            </button>
        </form>

        <div class="login-link">
            <p>Already have an account? <a href="/login">Login</a></p>
        </div>
    </div>

    <script>
        const nextUrl = new URLSearchParams(window.location.search).get('next') || '/';

        async function generateOTP() {
            const btn = document.getElementById('generateOTPBtn');
            const errorEl = document.getElementById('registerError');
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!fullName || !email || !password) {
                errorEl.textContent = 'Please fill in all fields.';
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner"></span> Sending...`;
            errorEl.style.display = 'none';

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name: fullName, email, password, next: nextUrl })
                });

                const data = await res.json();

                if (res.ok) {
                    document.getElementById('registerForm').style.display = 'none';
                    document.getElementById('otpForm').style.display = 'block';
                    document.getElementById('sentToEmail').textContent = email;
                } else {
                    errorEl.textContent = data.error || 'Something went wrong.';
                    errorEl.style.display = 'block';
                }

            } catch {
                errorEl.textContent = 'Network error. Please try again.';
                errorEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate OTP';
            }
        }

        async function resendOTP() {
            const otpError = document.getElementById('otpError');
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name: fullName, email, password, next: nextUrl })
                });

                if (res.ok) {
                    otpError.textContent = 'OTP resent. Please check your email.';
                    otpError.style.color = 'green';
                } else {
                    const data = await res.json();
                    otpError.textContent = data.error || 'Failed to resend OTP.';
                    otpError.style.color = 'red';
                }
            } catch {
                otpError.textContent = 'Network error. Please try again.';
                otpError.style.color = 'red';
            }
            otpError.style.display = 'block';
        }

        document.getElementById('otpForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('verifySignupOtpBtn');
            const errorEl = document.getElementById('otpError');
            const email = document.getElementById('email').value.trim();
            const otp = document.getElementById('otpInput').value.trim();

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner"></span> Verifying...`;
            errorEl.style.display = 'none';

            try {
                const res = await fetch('/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await res.json();

                if (res.ok) {
                    window.location.href = data.redirect || '/';
                } else if (res.status === 410) {
                    errorEl.textContent = data.error;
                    errorEl.style.color = 'red';
                    errorEl.style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('otpForm').style.display = 'none';
                        document.getElementById('registerForm').style.display = 'block';
                        document.getElementById('otpInput').value = '';
                    }, 2000);
                } else {
                    errorEl.textContent = data.error || 'Invalid OTP.';
                    errorEl.style.color = 'red';
                    errorEl.style.display = 'block';
                }

            } catch {
                errorEl.textContent = 'Network error. Please try again.';
                errorEl.style.color = 'red';
                errorEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Verify & Sign Up';
            }
        });

        document.getElementById('generateOTPBtn').addEventListener('click', generateOTP);
        document.getElementById('resendOTPBtn').addEventListener('click', resendOTP);
    </script>
</body>
</html>
