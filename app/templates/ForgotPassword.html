<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="../static/utility.css">
    <style>
        /* ── Change-password inline styles ── */

        .requirement {
            font-size: 0.78rem;
            color: #718096;
            margin: -8px 0 10px 2px;
        }

        .requirement.met  { color: #2d6a4f; }
        .requirement.unmet{ color: #e53e3e; }

        .match-indicator {
            font-size: 0.78rem;
            margin: -8px 0 10px 2px;
            display: none;
        }

        .match-indicator.match    { color: #2d6a4f; display: block; }
        .match-indicator.no-match { color: #e53e3e; display: block; }

        .form-error {
            color: #e53e3e;
            font-size: 0.84rem;
            margin-bottom: 10px;
            display: none;
        }

        .form-success {
            color: #2d6a4f;
            font-size: 0.84rem;
            margin-bottom: 10px;
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 4px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="page-centered">
    <div class="login-form">
        <h2>Set New Password</h2>

        <p id="formError" class="form-error"></p>
        <p id="formSuccess" class="form-success"></p>

        <!-- No <form> POST — we handle submission via fetch -->
        <div id="changePasswordForm">
            <input
                type="password"
                id="newPassword"
                placeholder="New Password"
                autocomplete="new-password"
                required
            >
            <p id="lengthHint" class="requirement">At least 8 characters</p>

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm New Password"
                autocomplete="new-password"
                required
            >
            <p id="matchIndicator" class="match-indicator"></p>

            <button type="button" id="submitBtn">Change Password</button>
        </div>
    </div>

    <script>
        // ── Helpers ───────────────────────────────────────────
        function show(el) { el.style.display = "block"; }
        function hide(el) { el.style.display = "none";  }

        // ── Elements ──────────────────────────────────────────
        const newPasswordInput  = document.getElementById("newPassword");
        const confirmInput      = document.getElementById("confirmPassword");
        const lengthHint        = document.getElementById("lengthHint");
        const matchIndicator    = document.getElementById("matchIndicator");
        const submitBtn         = document.getElementById("submitBtn");
        const formError         = document.getElementById("formError");
        const formSuccess       = document.getElementById("formSuccess");

        // ── Guard: must arrive here from OTP flow ─────────────
        const fpEmail = sessionStorage.getItem("fp_email");
        if (!fpEmail) {
            // No verified email — send back to login
            window.location.href = "/login";
        }

        // ── Live validation ───────────────────────────────────
        newPasswordInput.addEventListener("input", () => {
            const val = newPasswordInput.value;
            if (val.length === 0) {
                lengthHint.className = "requirement";
                lengthHint.textContent = "At least 8 characters";
            } else if (val.length < 8) {
                lengthHint.className = "requirement unmet";
                lengthHint.textContent = `${8 - val.length} more character${8 - val.length > 1 ? "s" : ""} needed`;
            } else {
                lengthHint.className = "requirement met";
                lengthHint.textContent = "✓ Length OK";
            }
            validateMatch();
        });

        confirmInput.addEventListener("input", validateMatch);

        function validateMatch() {
            const pw  = newPasswordInput.value;
            const cpw = confirmInput.value;

            if (!cpw) {
                matchIndicator.className = "match-indicator";
                matchIndicator.textContent = "";
                return;
            }

            if (pw === cpw) {
                matchIndicator.className = "match-indicator match";
                matchIndicator.textContent = "✓ Passwords match";
            } else {
                matchIndicator.className = "match-indicator no-match";
                matchIndicator.textContent = "✗ Passwords do not match";
            }
        }

        // ── Submit ────────────────────────────────────────────
        submitBtn.addEventListener("click", async () => {
            hide(formError);
            hide(formSuccess);

            const password         = newPasswordInput.value;
            const confirm_password = confirmInput.value;

            // Client-side guards (server re-validates too)
            if (!password || !confirm_password) {
                formError.textContent = "Please fill in both fields.";
                show(formError);
                return;
            }

            if (password.length < 8) {
                formError.textContent = "Password must be at least 8 characters.";
                show(formError);
                return;
            }

            if (password !== confirm_password) {
                formError.textContent = "Passwords do not match.";
                show(formError);
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="spinner"></span> Updating…`;

            try {
                const res = await fetch("/change-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: fpEmail,
                        password,
                        confirm_password
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    formError.textContent = data.error || "Something went wrong.";
                    show(formError);
                } else {
                    sessionStorage.removeItem("fp_email");
                    formSuccess.textContent = "Password changed! Redirecting…";
                    show(formSuccess);
                    // Brief pause so user sees the confirmation
                    setTimeout(() => { window.location.href = data.redirect; }, 1200);
                }
            } catch {
                formError.textContent = "Network error. Please try again.";
                show(formError);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Change Password";
            }
        });

        // Allow Enter key on confirm field
        confirmInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") submitBtn.click();
        });
    </script>
</body>
</html>
