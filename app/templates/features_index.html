<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Hub</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="../static/ngo_features.css">
</head>
<body>
<header>
    <nav>
        <div class="nav-left">
            <div class="logo">
                <a href="/"><img src="../static/images/NGO_Connect.png" alt="NGO Connect Logo"></a>
            </div>
            <ul class="nav-links">
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
                <li><a href="/donate">Donate</a></li>
            </ul>
        </div>
        <div class="auth-buttons">
            <a class="btn login" href="/login">Login</a>
            <a class="btn signup" href="/register">Sign Up</a>
        </div>
    </nav>
</header>
<main class="page-content" data-page="features">
    <section class="feature-hub">
        <div class="feature-hub-header">
            <h1>NGO Connect Feature Hub</h1>
            <p>Access every new feature page from one place.</p>
        </div>
        <div class="feature-grid">
            <a class="feature-card" href="/urgency">🔥 Urgency Dashboard</a>
            <a class="feature-card" href="/clusters">🧩 Problem Clusters</a>
            <a class="feature-card" href="/volunteer-match">🤝 Volunteer Matching</a>
            <a class="feature-card" href="/resources">📦 Resource Allocation</a>
            <a class="feature-card" href="/efficiency">📈 Volunteer Efficiency</a>
            <a class="feature-card" href="/alerts">🚨 Alerts Dashboard</a>
            <a class="feature-card" href="/trust">⭐ Trust System</a>
        </div>
    </section>
</main>
<footer>
    <p>&copy; 2026 NGO Connect. All rights reserved.</p>
</footer>
<style>
    body { background:#f8fafc; color:#111827; margin:0; font-family:Inter, system-ui, sans-serif; }
    header { background:#fff; border-bottom:1px solid #e5e7eb; position:sticky; top:0; z-index:50; }
    nav { display:flex; justify-content:space-between; align-items:center; max-width:1180px; margin:0 auto; padding:18px 22px; }
    .nav-left { display:flex; align-items:center; gap:20px; }
    .logo img { height:38px; }
    .nav-links { display:flex; gap:18px; list-style:none; padding:0; margin:0; }
    .nav-links a { text-decoration:none; color:#374151; font-weight:600; }
    .auth-buttons { display:flex; gap:12px; }
    .btn { padding:10px 16px; border-radius:999px; text-decoration:none; font-weight:600; }
    .btn.login { background:#eef2ff; color:#4338ca; }
    .btn.signup { background:#4338ca; color:#fff; }
    .feature-hub { max-width:1160px; margin:48px auto 64px; padding:0 18px; }
    .feature-hub-header h1 { margin:0 0 12px; font-size:2.4rem; }
    .feature-hub-header p { margin:0; color:#475569; font-size:1rem; }
    .feature-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:18px; margin-top:32px; }
    .feature-card { display:flex; align-items:center; justify-content:center; min-height:130px; padding:18px; border-radius:20px; background:#fff; border:1px solid #e5e7eb; color:#1f2937; text-decoration:none; font-weight:700; transition:transform .2s ease, box-shadow .2s ease; }
    .feature-card:hover { transform:translateY(-3px); box-shadow:0 18px 50px rgba(15,23,42,.08); }
    footer { text-align:center; padding:24px 0; color:#6b7280; }
</style>
</body>
</html>
