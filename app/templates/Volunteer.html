<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer with NGOs</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="../static/utility.css">
</head>
<div id="auth-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:999; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:12px; padding:2rem; max-width:360px; width:90%; text-align:center;">
        <p style="margin-bottom:1.2rem; font-size:1rem;">Please log in to continue.</p>
        <div style="display:flex; gap:0.75rem; justify-content:center;">
            <a href="/login" style="padding:0.5rem 1.2rem; background:#2563eb; color:#fff; border-radius:6px; text-decoration:none;">Login</a>
            <button onclick="closeModal()" style="padding:0.5rem 1.2rem; border:1px solid #ccc; border-radius:6px; background:none; cursor:pointer;">Cancel</button>
        </div>
    </div>
</div>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <div class="logo">
                    <a href="/">
                        <img src="../static/images/NGO_Connect.png" alt="NGO Connect Logo">
                    </a>
                </div>
                <ul class="nav-links">
                    <li><a href="/about">About</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </div>
            <div class="nav-center">
                <div class="options">
                    <a type="explore" class="option" href="/explore">Explore NGOs</a>
                    <a type="donate" class="option" href="/donate">Donate</a>
                    <a type="volunteer" class="option" href="/volunteer">Volunteer</a>
                </div>
            </div>
            <div class="auth-buttons">
                <a class="btn login" href="/login">Login</a>
                <a class="btn signup" href="/register">Sign Up</a>
            </div>
        </nav>
    </header>
    <main>
        <div class="bg">
            <div class="search">
                <input type="text" id="searchInput" placeholder="Search NGO">
                <button onclick="searchNGOs()">Search</button>
            </div>
            <div class="ngo-list" id="ngoList">
                <!-- NGO list -->
            </div>
            <div class="volunteer-section" id="volunteerSection">
                <h3>Volunteer with <span id="ngoName"></span></h3>
                <textarea onclick="applyVolunteer()" id="skills" placeholder="Enlist your skills (e.g., teaching children, helping elderly, cleaning)"></textarea>
                <button onclick="applyVolunteer()">Request to Volunteer</button>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 NGO Connect. All rights reserved.</p>
    </footer>
    <script src="../static/Volunteer.js"></script>
</body>
</html>
