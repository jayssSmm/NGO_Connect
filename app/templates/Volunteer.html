<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer with NGOs</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="../static/utility.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <div class="logo">
                    <a href="/">
                        <img src="../static/images/NGO_Connect.png" alt="NGO Connect Logo">
                    </a>
                </div>
                <ul class="nav-links">
                    <li><a href="/about">About</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </div>
            <div class="nav-center">
                <div class="options">
                    <a type="explore" class="option" href="/explore">Explore NGOs</a>
                    <a type="donate" class="option" href="/donate">Donate</a>
                    <a type="volunteer" class="option" href="/volunteer">Volunteer</a>
                </div>
            </div>
            <div class="auth-buttons">
                <a class="btn login" href="/login">Login</a>
                <a class="btn signup" href="/register">Sign Up</a>
            </div>
        </nav>
    </header>
    <main>
        <div class="bg">
            <div class="search">
                <input type="text" id="searchInput" placeholder="Search NGO">
                <button onclick="searchNGOs()">Search</button>
            </div>
            <div class="ngo-list" id="ngoList">
                <!-- NGO list -->
            </div>
            <div class="volunteer-section" id="volunteerSection">
                <h3>Volunteer with <span id="ngoName"></span></h3>
                <textarea id="skills" placeholder="Enlist your skills (e.g., teaching children, helping elderly, cleaning)"></textarea>
                <button onclick="applyVolunteer()">Request to Volunteer</button>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 NGO Connect. All rights reserved.</p>
    </footer>
</body>
</html>
