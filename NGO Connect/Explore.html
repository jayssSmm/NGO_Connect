<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore NGOs</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/utility.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <div class="logo">
                    <a href="index.html">
                        <img src="images/NGO_Connect.png" alt="NGO Connect Logo">
                    </a>
                </div>
                <ul class="nav-links">
                    <li><a href="About.html">About</a></li>
                    <li><a href="Contact.html">Contact</a></li>
                </ul>
            </div>
            <div class="nav-center">
                <div class="options">
                    <a type="explore" class="option" href="Explore.html">Explore NGOs</a>
                    <a type="donate" class="option" href="Donate.html">Donate</a>
                    <a type="volunteer" class="option" href="Volunteer.html">Volunteer</a>
                </div>
            </div>
            <div class="auth-buttons">
                <a class="btn login" href="Login.html">Login</a>
                <a class="btn signup" href="Signup.html">Sign Up</a>
            </div>
        </nav>
    </header>
    <main>
        <div class="bg">
            <div class="nav-center">
                <div class="search">
                    <input type="text" id="searchInput" placeholder="Search NGOs">
                    <button type="submit" onclick="searchNGOs()">Search</button>
                </div>
            </div>
            <div class="near-you">
                <h3>Want to know NGOs near you?</h3>
                <input type="text" id="coordsInput" placeholder="Paste your coordinates here (latitude, longitude)">
                <button onclick="getLocation()">Get My Location</button>
                <button onclick="findNearbyNGOs()">Find Nearby NGOs</button>
            </div>
            <div class="ngo-list" id="ngoList">
                <!-- NGO list will be populated here -->
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 NGO Connect. All rights reserved.</p>
    </footer>
    <script>
        function searchNGOs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const ngos = [
                { name: 'Green Earth NGO', location: 'Kolkata', lat: 22.5726, lng: 88.3639 },
                { name: 'Helping Hands', location: 'Delhi', lat: 28.7041, lng: 77.1025 },
                { name: 'Child Care Foundation', location: 'Mumbai', lat: 19.0760, lng: 72.8777 },
                // Add more dummy NGOs
            ];
            const filtered = ngos.filter(ngo => ngo.name.toLowerCase().includes(query) || ngo.location.toLowerCase().includes(query));
            displayNGOs(filtered);
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const coords = `${lat}, ${lng}`;
                    navigator.clipboard.writeText(coords).then(() => {
                        alert('Coordinates copied to clipboard: ' + coords);
                        document.getElementById('coordsInput').value = coords;
                    });
                });
            } else {
                alert('Geolocation is not supported by this browser.');
            }
        }

        function findNearbyNGOs() {
            const coords = document.getElementById('coordsInput').value.split(',').map(c => parseFloat(c.trim()));
            if (coords.length !== 2 || isNaN(coords[0]) || isNaN(coords[1])) {
                alert('Please enter valid coordinates.');
                return;
            }
            const userLat = coords[0];
            const userLng = coords[1];
            const ngos = [
                { name: 'Green Earth NGO', location: 'Kolkata', lat: 22.5726, lng: 88.3639 },
                { name: 'Helping Hands', location: 'Delhi', lat: 28.7041, lng: 77.1025 },
                { name: 'Child Care Foundation', location: 'Mumbai', lat: 19.0760, lng: 72.8777 },
            ];
            const nearby = ngos.filter(ngo => {
                const distance = getDistance(userLat, userLng, ngo.lat, ngo.lng);
                return distance <= 5; // 5km radius
            });
            displayNGOs(nearby);
        }

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371; // Radius of the earth in km
            const dLat = deg2rad(lat2 - lat1);
            const dLng = deg2rad(lng2 - lng1);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const d = R * c; // Distance in km
            return d;
        }

        function deg2rad(deg) {
            return deg * (Math.PI/180);
        }

        function displayNGOs(ngos) {
            const list = document.getElementById('ngoList');
            list.innerHTML = '';
            ngos.forEach(ngo => {
                const item = document.createElement('div');
                item.className = 'ngo-item';
                item.innerHTML = `<h4>${ngo.name}</h4><p>Location: ${ngo.location}</p>`;
                list.appendChild(item);
            });
        }

        // Load all NGOs initially
        window.onload = function() {
            const ngos = [
                { name: 'Green Earth NGO', location: 'Kolkata', lat: 22.5726, lng: 88.3639 },
                { name: 'Helping Hands', location: 'Delhi', lat: 28.7041, lng: 77.1025 },
                { name: 'Child Care Foundation', location: 'Mumbai', lat: 19.0760, lng: 72.8777 },
            ];
            displayNGOs(ngos);
        };

        function updateHeaderOnLoad() {
            const userSession = sessionStorage.getItem('userSession');
            const authButtons = document.querySelector('.auth-buttons');
            
            if (userSession && authButtons) {
                const user = JSON.parse(userSession);
                authButtons.innerHTML = `
                    <div class="hamburger" onclick="toggleUserMenu()">☰ ${user.name || user.email}</div>
                    <div class="user-menu" id="userMenu" style="display:none;">
                        <a href="Dashboard.html">Dashboard</a>
                        <a href="#" onclick="logout()">Logout</a>
                    </div>
                `;
            }
        }

        function toggleUserMenu() {
            const menu = document.getElementById('userMenu');
            if (menu) {
                menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
            }
        }

        function logout() {
            sessionStorage.removeItem('userSession');
            sessionStorage.removeItem('userType');
            sessionStorage.removeItem('notifications');
            alert('Logged out successfully!');
            window.location.reload();
        }

        window.addEventListener('load', updateHeaderOnLoad);
    </script>
</body>
</html>
