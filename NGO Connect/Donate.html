<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate to NGOs</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/utility.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <div class="logo">
                    <a href="index.html">
                        <img src="images/NGO_Connect.png" alt="NGO Connect Logo">
                    </a>
                </div>
                <ul class="nav-links">
                    <li><a href="About.html">About</a></li>
                    <li><a href="Contact.html">Contact</a></li>
                </ul>
            </div>
            <div class="nav-center">
                <div class="options">
                    <a type="explore" class="option" href="Explore.html">Explore NGOs</a>
                    <a type="donate" class="option" href="Donate.html">Donate</a>
                    <a type="volunteer" class="option" href="Volunteer.html">Volunteer</a>
                </div>
            </div>
            <div class="auth-buttons">
                <a class="btn login" href="Login.html">Login</a>
                <a class="btn signup" href="Signup.html">Sign Up</a>
            </div>
        </nav>
    </header>
    <main>
        <div class="bg">
            <div class="search">
                <input type="text" id="searchInput" placeholder="Search NGO">
                <button onclick="searchNGOs()">Search</button>
            </div>
            <div class="ngo-list" id="ngoList">
                <!-- NGO list -->
            </div>
            <div class="donation-section" id="donationSection">
                <h3>Donate to <span id="ngoName"></span></h3>
                <div>
                    <h4>Donate Money</h4>
                    <input type="number" id="amount" placeholder="Amount (min 1 INR)" min="1">
                    <button onclick="donateMoney()">Donate Money</button>
                </div>
                <div>
                    <h4>Donate Items</h4>
                    <textarea id="items" placeholder="List items you want to donate"></textarea>
                    <button onclick="donateItems()">Donate Items</button>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 NGO Connect. All rights reserved.</p>
    </footer>
    <script>
        let currentNGO = null;
        let isLoggedIn = false;
        let userType = 'guest'; // 'guest' or 'registered'
        
        const ngos = [
            { name: 'Green Earth NGO', location: 'Kolkata', scannerId: 'GE001' },
            { name: 'Helping Hands', location: 'Delhi', scannerId: 'HH002' },
            { name: 'Child Care Foundation', location: 'Mumbai', scannerId: 'CCF003' },
        ];

        // Check login status on page load
        function checkLoginStatus() {
            const userSession = sessionStorage.getItem('userSession');
            if (userSession) {
                isLoggedIn = true;
                userType = sessionStorage.getItem('userType') || 'registered';
            }
        }

        function searchNGOs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = ngos.filter(ngo => ngo.name.toLowerCase().includes(query));
            displayNGOs(filtered);
        }

        function displayNGOs(ngos) {
            const list = document.getElementById('ngoList');
            list.innerHTML = '';
            ngos.forEach(ngo => {
                const item = document.createElement('div');
                item.className = 'ngo-item';
                item.innerHTML = `<h4>${ngo.name}</h4><p>Location: ${ngo.location}</p>`;
                item.onclick = () => selectNGO(ngo);
                list.appendChild(item);
            });
        }

        function selectNGO(ngo) {
            currentNGO = ngo;
            document.getElementById('ngoName').textContent = ngo.name;
            document.getElementById('donationSection').style.display = 'block';
        }

        function donateMoney() {
            const amount = document.getElementById('amount').value;
            if (!amount || amount < 1) {
                alert('Minimum donation is 1 INR.');
                return;
            }

            // Show dummy Razorpay scanner
            showRazorpayScanner(currentNGO, amount);
        }

        function showRazorpayScanner(ngo, amount) {
            const scannerCode = `
RAZORPAY_QR_CODE_${ngo.scannerId}
Amount: ${amount} INR
NGO: ${ngo.name}
Scan this code with any UPI app to proceed with payment.

Dummy QR: [QR_${ngo.scannerId}_${Date.now()}]
            `;
            
            alert('Razorpay Dummy Scanner for ' + ngo.name + ':\n\n' + scannerCode + '\n\nAfter scanning and payment, you will receive confirmation.');
            
            // Simulate payment confirmation
            setTimeout(() => {
                processMoneyDonation(ngo, amount);
            }, 500);
        }

        function processMoneyDonation(ngo, amount) {
            let message = `Payment of ${amount} INR sent to ${ngo.name}. `;
            
            if (isLoggedIn && userType === 'registered') {
                message += 'Confirmation received on both website and payment app.';
                alert(message);
                addNotification(`Donation of ${amount} INR to ${ngo.name} confirmed.`);
            } else {
                message += 'Confirmation received on payment app.';
                alert(message);
            }
            
            document.getElementById('amount').value = '';
        }

        function donateItems() {
            if (!isLoggedIn) {
                alert('Please log in or sign up to donate items.');
                return;
            }
            
            const items = document.getElementById('items').value;
            if (items.trim()) {
                alert('Item list sent to ' + currentNGO.name + '. You will be notified of acceptance/rejection on your dashboard and email.');
            } else {
                alert('Please list items to donate.');
            }
        }

        function addNotification(message) {
            // Add to dashboard notifications (simulated)
            const notifications = JSON.parse(sessionStorage.getItem('notifications') || '[]');
            notifications.push(message);
            sessionStorage.setItem('notifications', JSON.stringify(notifications));
        }

        window.onload = function() {
            checkLoginStatus();
            displayNGOs(ngos);
            updateHeaderOnLoad();
        };

        function updateHeaderOnLoad() {
            const userSession = sessionStorage.getItem('userSession');
            const authButtons = document.querySelector('.auth-buttons');
            
            if (userSession && authButtons) {
                const user = JSON.parse(userSession);
                authButtons.innerHTML = `
                    <div class="hamburger" onclick="toggleUserMenu()">☰ ${user.name || user.email}</div>
                    <div class="user-menu" id="userMenu" style="display:none;">
                        <a href="Dashboard.html">Dashboard</a>
                        <a href="#" onclick="logout()">Logout</a>
                    </div>
                `;
            }
        }

        function toggleUserMenu() {
            const menu = document.getElementById('userMenu');
            if (menu) {
                menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
            }
        }

        function logout() {
            sessionStorage.removeItem('userSession');
            sessionStorage.removeItem('userType');
            sessionStorage.removeItem('notifications');
            alert('Logged out successfully!');
            window.location.reload();
        }
    </script>
</body>
</html>
