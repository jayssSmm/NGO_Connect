<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Detail | NGO Connect</title>
    <link rel="stylesheet" href="static/styles.css">
    <link rel="stylesheet" href="static/utility.css">
    <style>
        .detail-page { max-width: 980px; margin: 0 auto; padding: 40px 20px; }
        .detail-card { background: #fff; border-radius: 24px; box-shadow: 0 18px 48px rgba(15,23,42,.08); padding: 36px; }
        .detail-card h1 { margin: 0 0 10px; font-size: 2rem; color: #1f2937; }
        .detail-card .meta { color: #64748b; margin-bottom: 24px; }
        .detail-card p { margin: 0 0 16px; line-height: 1.8; color: #334155; }
        .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; margin-bottom: 26px; }
        .detail-box { padding: 20px; background: #f8fafc; border-radius: 18px; border: 1px solid #e2e8f0; }
        .detail-box h3 { margin: 0 0 10px; font-size: 0.95rem; color: #0f172a; }
        .detail-box p { margin: 0; color: #475569; font-size: 0.94rem; }
        .detail-actions { display: flex; gap: 14px; flex-wrap: wrap; }
        .detail-actions a { text-decoration: none; display: inline-flex; align-items: center; justify-content: center; padding: 14px 18px; border-radius: 14px; background: #2563eb; color: #fff; font-weight: 600; min-width: 170px; }
        .detail-actions a.secondary { background: #f8fafc; color: #1f2937; border: 1px solid #cbd5e1; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 24px; color: #2563eb; }
        @media(max-width:720px){ .detail-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <div class="logo">
                    <a href="/">
                        <img src="static/images/NGO_Connect.png" alt="NGO Connect Logo">
                    </a>
                </div>
                <ul class="nav-links">
                    <li><a href="/about">About</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </div>
            <div class="nav-center">
                <div class="options">
                    <a type="explore" class="option" href="/explore">Explore NGOs</a>
                    <a type="donate" class="option" href="/donate">Donate</a>
                    <a type="volunteer" class="option" href="/volunteer">Volunteer</a>
                </div>
            </div>
            <div class="auth-buttons">
                <a class="btn login" href="/login">Login</a>
                <a class="btn signup" href="/register">Sign Up</a>
            </div>
        </nav>
    </header>
    <main class="detail-page">
        <a href="/explore" class="back-link">← Back to Explore</a>
        <div class="detail-card" id="ngoDetail">
            <h1>Loading...</h1>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 NGO Connect. All rights reserved.</p>
    </footer>
    <script src="static/Explore.js"></script>
    <script>
        const API_BASE = 'https://your-backend.onrender.com'; // Change this to your backend URL

        async function loadNGODetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const ngoId = urlParams.get('id') || window.location.pathname.split('/').pop();
            if (!ngoId) {
                document.getElementById('ngoDetail').innerHTML = '<h1>NGO not found</h1><p>Invalid ID.</p>';
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/api/ngo/${ngoId}`);
                if (!res.ok) throw new Error('NGO not found');
                const ngo = await res.json();
                document.title = `${ngo.name} | NGO Connect`;
                document.getElementById('ngoDetail').innerHTML = `
                    <h1>${ngo.name}</h1>
                    <div class="meta">${ngo.category} | Established ${ngo.established_year}</div>
                    <p>${ngo.focus}</p>
                    <div class="detail-grid">
                        <div class="detail-box">
                            <h3>Location</h3>
                            <p>${ngo.location}</p>
                            <p>${ngo.address}</p>
                        </div>
                        <div class="detail-box">
                            <h3>Contact</h3>
                            <p>Phone: ${ngo.contact}</p>
                            <p>Email: ${ngo.email}</p>
                        </div>
                    </div>
                    <div class="detail-actions">
                        <a href="/donate?id=${ngo.id}">Donate to this NGO</a>
                        <a class="secondary" href="/volunteer?id=${ngo.id}">Volunteer with this NGO</a>
                    </div>
                `;
            } catch (error) {
                document.getElementById('ngoDetail').innerHTML = '<h1>NGO not found</h1><p>Sorry, we couldn\'t locate this NGO.</p>';
            }
        }

        window.onload = async function() {
            await updateHeaderOnLoad();
            loadNGODetail();
        };
    </script>
</body>
</html>
