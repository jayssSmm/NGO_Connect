<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="static/styles.css">
    <link rel="stylesheet" href="static/utility.css">
    <style>
        .error-text { color: #e53e3e; margin: 0 0 16px; display: none; font-size: 0.95rem; }
        .info-text { color: #166534; margin: 0 0 16px; display: none; font-size: 0.95rem; }
    </style>
</head>
<body class="page-centered">
    <div class="login-form">
        <h2>Login</h2>
        <p id="errorMessage" class="error-text"></p>
        <form id="loginForm">
            <input type="hidden" id="nextUrl" name="next" value="">
            <input type="email" id="email" name="email" placeholder="Email" required>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p id="infoMessage" class="info-text"></p>
        <div class="signup-link">
            <p>Don't have an account? <a href="/register">Sign Up</a></p>
        </div>
    </div>

    <script>
        const API_BASE = 'https://your-backend.onrender.com'; // Change to your backend URL

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const infoMessage = document.getElementById('infoMessage');
        let loginAttempts = 0;

        // Set nextUrl from URL param
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('nextUrl').value = urlParams.get('next') || '/';

        loginForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            errorMessage.style.display = 'none';
            infoMessage.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const nextUrl = document.getElementById('nextUrl').value || '/';

            if (!email || !password) {
                errorMessage.textContent = 'Please enter both email and password.';
                errorMessage.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(API_BASE + '/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, next: nextUrl }),
                    credentials: 'include'
                });
                const data = await res.json();

                if (res.ok) {
                    window.location.href = data.redirect || '/';
                } else {
                    loginAttempts += 1;
                    errorMessage.textContent = data.error || 'Wrong credentials. Try again.';
                    errorMessage.style.display = 'block';
                    if (loginAttempts >= 3) {
                        alert('Sign Up before Login');
                    }
                }
            } catch (err) {
                errorMessage.textContent = 'Unable to log in right now. Please try again later.';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
